name: Update publications from Google Scholar

on:
  schedule:
    # Daily at 05:30 UTC. Scholar may occasionally rate-limit; the job just
    # skips committing on those days and retries the next run.
    - cron: "30 5 1 * *"
  workflow_dispatch: {}

permissions:
  contents: write

env:
  # Google Scholar profile ID (the `user=` value in the profile URL). Public info.
  SCHOLAR_ID: "Nm7mot8AAAAJ"

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch publications
        run: python scripts/update_publications.py

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- data/publications.json; then
            git add data/publications.json
            git commit -m "chore: update publications from Google Scholar"
            git push
          else
            echo "No changes to publications."
          fi
